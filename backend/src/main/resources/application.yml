spring:
  application:
    name: opencrm
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/opencrm}
    username: ${SPRING_DATASOURCE_USERNAME:opencrm}
    password: ${SPRING_DATASOURCE_PASSWORD:opencrm_dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars!!}
    access-token-expiry: 3600000
    refresh-token-expiry: 604800000

server:
  port: 8080
